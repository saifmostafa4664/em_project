name: em_project
description: "6OTU Smart Attendance System - نظام الحضور الذكي"
publish_to: 'none'

version: 2.4.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.3
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  printing: ^5.12.0
  flutter_libserialport: ^0.4.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assest/logo/363331987_257713613788245_2395123892953238221_n 1.png

  fonts:
    - family: Zain
      fonts:
        - asset: assest/fonts/Zain/Zain-Regular.ttf
          weight: 400
        - asset: assest/fonts/Zain/Zain-Light.ttf
          weight: 300
        - asset: assest/fonts/Zain/Zain-ExtraLight.ttf
          weight: 200
        - asset: assest/fonts/Zain/Zain-Bold.ttf
          weight: 700
        - asset: assest/fonts/Zain/Zain-ExtraBold.ttf
          weight: 800
        - asset: assest/fonts/Zain/Zain-Black.ttf
          weight: 900
        - asset: assest/fonts/Zain/Zain-Italic.ttf
          style: italic
        - asset: assest/fonts/Zain/Zain-LightItalic.ttf
          weight: 300
          style: italic
